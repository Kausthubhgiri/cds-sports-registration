<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CDS Sports Meet Registration</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background: #f2f2f2;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }
    input, select, button {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.3rem;
      font-size: 1rem;
    }
    fieldset {
      margin-top: 1rem;
      padding: 1rem;
      border: 1px solid #ccc;
    }
    legend {
      font-weight: bold;
    }
    #event-options label {
      display: block;
      margin: 0.3rem 0;
    }
    button {
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      margin-top: 1rem;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    #status {
      margin-top: 1rem;
      font-weight: bold;
    }
    #preview {
      margin-top: 1rem;
      max-width: 200px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="banner">
    <img src="banner.png" alt="CDS Sports Meet Banner">
  </div>
  <h1>🏆 CDS Sports Meet – Registration</h1>

  <form id="regForm" enctype="multipart/form-data">
    <label for="school">School Name</label>
    <input type="text" id="school" name="school" placeholder="School Name" required>

    <label for="name">Participant Name</label>
    <input type="text" id="name" name="name" placeholder="Participant Name" required>

    <label for="chest">Chest Number</label>
    <input type="number" id="chest" name="chest" placeholder="Chest Number" required>

    <label for="dob">Date of Birth</label>
    <input type="date" id="dob" name="dob" title="Date of Birth" required>

    <label for="ageCategory">Age Category</label>
    <select id="ageCategory" name="ageCategory" required>
      <option value="" disabled selected>Select Age Group</option>
      <option>Under 11</option>
      <option>Under 14</option>
      <option>Under 16</option>
      <option>Under 17</option>
      <option>Under 19</option>
    </select>

    <label for="gender">Gender</label>
    <select id="gender" name="gender" required>
      <option value="" disabled selected>Select Gender</option>
      <option>Male</option>
      <option>Female</option>
      <option>Other</option>
    </select>

    <fieldset>
      <legend>Choose Events (select one or more)</legend>
      <div id="event-options">
        <label><input type="checkbox" name="events" value="50m Race"> 50m Race</label>
        <label><input type="checkbox" name="events" value="100m Race"> 100m Race</label>
        <label><input type="checkbox" name="events" value="200m"> 200m</label>
        <label><input type="checkbox" name="events" value="400m"> 400m</label>
        <label><input type="checkbox" name="events" value="800m"> 800m</label>
        <label><input type="checkbox" name="events" value="1500m"> 1500m</label>
        <label><input type="checkbox" name="events" value="Shot Put"> Shot Put</label>
        <label><input type="checkbox" name="events" value="Discus Throw"> Discus Throw</label>
        <label><input type="checkbox" name="events" value="Long Jump"> Long Jump</label>
        <label><input type="checkbox" name="events" value="High Jump"> High Jump</label>
        <label><input type="checkbox" name="events" value="4x100m Relay"> 4x100m Relay</label>
        <label><input type="checkbox" name="events" value="4x400m Relay"> 4x400m Relay</label>
      </div>
    </fieldset>

    <label for="photo">Upload Photo</label>
    <input type="file" id="photo" name="photo" accept="image/*" required>
    <img id="preview" alt="Photo Preview">

    <button type="submit">Submit</button>
  </form>

  <div id="status" role="status" aria-live="polite"></div>

  <script>
    const form = document.getElementById('regForm');
    const statusDiv = document.getElementById('status');
    const photoInput = document.getElementById('photo');
    const preview = document.getElementById('preview');

    // Show photo preview
    photoInput.addEventListener('change', function () {
      const file = photoInput.files[0];
      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    });

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      // Validate at least one event selected
      const eventsChecked = document.querySelectorAll('input[name="events"]:checked');
      if (eventsChecked.length === 0) {
        statusDiv.textContent = "❌ Please select at least one event.";
        return;
      }

      const formData = new FormData(form);

    fetch('/submit', {
  method: 'POST',
  body: formData
})
.then(async res => {
  if (!res.ok) {
    const errorText = await res.text();
    throw new Error(errorText || 'Submission failed');
  }
  return res.json();
})
.then(data => {
  statusDiv.textContent = "✅ Registration successful!";
  form.reset();
  preview.style.display = 'none';
})
.catch(err => {
  console.error("❌ Submission error:", err);
  statusDiv.textContent = `❌ ${err.message}`;
});
  </script>
</body>
</html>
